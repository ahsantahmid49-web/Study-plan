<!DOCTYPE html>
<html lang="en" data-theme="dark" data-accent="emerald" data-fontsize="medium">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyFlow — Your Study Companion</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"><\/script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg-secondary:#161b22;--bg-tertiary:#21262d;--card-bg:#161b22;
  --border:rgba(255,255,255,.07);--border-strong:rgba(255,255,255,.15);
  --text-primary:#e6edf3;--text-secondary:#8b949e;--text-muted:#6e7681;
  --accent:#10b981;--accent-rgb:16,185,129;--danger:#f85149;
  --sidebar-w:240px;--topbar-h:60px;--radius:12px;--radius-sm:8px;
  --shadow:0 4px 24px rgba(0,0,0,.5);--transition:.2s ease;
  --font:'Inter',system-ui,-apple-system,sans-serif;
}
[data-accent="emerald"]{--accent:#10b981;--accent-rgb:16,185,129}
[data-accent="blue"]   {--accent:#3b82f6;--accent-rgb:59,130,246}
[data-accent="purple"] {--accent:#8b5cf6;--accent-rgb:139,92,246}
[data-accent="orange"] {--accent:#f97316;--accent-rgb:249,115,22}
[data-accent="pink"]   {--accent:#ec4899;--accent-rgb:236,72,153}
[data-accent="yellow"] {--accent:#eab308;--accent-rgb:234,179,8}
[data-theme="light"]{
  --bg:#f0f4f8;--bg-secondary:#fff;--bg-tertiary:#e8eef4;--card-bg:#fff;
  --border:rgba(0,0,0,.08);--border-strong:rgba(0,0,0,.16);
  --text-primary:#0f172a;--text-secondary:#475569;--text-muted:#94a3b8;
}
[data-fontsize="small"] {font-size:13px}
[data-fontsize="medium"]{font-size:15px}
[data-fontsize="large"] {font-size:17px}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text-primary);line-height:1.5;overflow:hidden}

/* LOADER */
#loader{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s,visibility .4s}
#loader.hide{opacity:0;visibility:hidden;pointer-events:none}
.loader-inner{display:flex;flex-direction:column;align-items:center;gap:16px}
.loader-logo{font-size:2.4rem;font-weight:800;color:var(--accent);letter-spacing:-2px}
.loader-logo span{color:var(--text-secondary);font-weight:300}
.loader-spinner{width:38px;height:38px;border:3px solid var(--border-strong);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* LAYOUT */
.app-wrapper{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
#sidebar{width:var(--sidebar-w);background:var(--bg-secondary);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;z-index:100;overflow-y:auto;overflow-x:hidden;transition:left .2s}
.sidebar-header{display:flex;align-items:center;justify-content:space-between;padding:18px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-logo{font-size:1.2rem;font-weight:800;color:var(--accent);letter-spacing:-.5px}
.sidebar-logo span{color:var(--text-secondary);font-weight:400}
#sidebarClose{background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:1.1rem;display:none;padding:4px}
nav{padding:8px;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text-secondary);font-size:.875rem;font-weight:500;transition:all var(--transition);text-decoration:none;border:none;background:none;width:100%;text-align:left;margin-bottom:2px}
.nav-item i{width:16px;text-align:center;font-size:.85rem}
.nav-item:hover{background:var(--bg-tertiary);color:var(--text-primary)}
.nav-item.active{background:rgba(var(--accent-rgb),.12);color:var(--accent)}
.nav-label{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);padding:10px 12px 3px}
.nav-div{height:1px;background:var(--border);margin:6px 10px}
.sidebar-footer{padding:16px;border-top:1px solid var(--border);flex-shrink:0}
.streak-badge{display:flex;align-items:center;gap:8px;padding:10px 12px;background:rgba(var(--accent-rgb),.1);border-radius:var(--radius-sm);border:1px solid rgba(var(--accent-rgb),.2)}
.streak-badge i{color:var(--accent)}
.streak-badge-text{font-size:.8rem;color:var(--text-secondary)}
.streak-badge-text strong{color:var(--text-primary)}
#sidebarOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
#sidebarOverlay.show{display:block}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* TOPBAR */
.topbar{height:var(--topbar-h);display:flex;align-items:center;gap:12px;padding:0 20px;background:var(--bg-secondary);border-bottom:1px solid var(--border);flex-shrink:0}
#menuToggle{background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:1.2rem;display:none;padding:4px}
.search-wrap{flex:1;max-width:360px;position:relative}
.search-wrap i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:.85rem}
#globalSearch{width:100%;padding:8px 12px 8px 34px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-size:.875rem;outline:none;transition:border-color var(--transition)}
#globalSearch:focus{border-color:var(--accent)}
#globalSearch::placeholder{color:var(--text-muted)}
.topbar-spacer{flex:1}
.topbar-actions{display:flex;align-items:center;gap:4px}
.icon-btn{background:none;border:none;color:var(--text-secondary);cursor:pointer;width:36px;height:36px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:.95rem;transition:all var(--transition)}
.icon-btn:hover{background:var(--bg-tertiary);color:var(--text-primary)}
.icon-btn.active{color:var(--accent);background:rgba(var(--accent-rgb),.1)}
.accent-wrap{position:relative}
#accentDropdown{position:absolute;top:calc(100% + 8px);right:0;background:var(--card-bg);border:1px solid var(--border-strong);border-radius:var(--radius-sm);padding:8px;z-index:200;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:opacity var(--transition);display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
#accentDropdown.show{opacity:1;pointer-events:all}
.accent-opt{width:24px;height:24px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform var(--transition)}
.accent-opt:hover{transform:scale(1.2)}
.accent-opt.active{border-color:var(--text-primary)}
.accent-opt[data-accent="emerald"]{background:#10b981}
.accent-opt[data-accent="blue"]   {background:#3b82f6}
.accent-opt[data-accent="purple"] {background:#8b5cf6}
.accent-opt[data-accent="orange"] {background:#f97316}
.accent-opt[data-accent="pink"]   {background:#ec4899}
.accent-opt[data-accent="yellow"] {background:#eab308}

/* CONTENT */
.content{flex:1;overflow-y:auto;overflow-x:hidden}
.section{display:none;padding:24px;max-width:1200px;margin:0 auto}
.section.active{display:block}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.section-title{font-size:1.4rem;font-weight:700;letter-spacing:-.5px}
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:20px}

/* BUTTONS */
.btn-primary{padding:8px 16px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);cursor:pointer;font-size:.875rem;font-weight:600;transition:opacity var(--transition);display:inline-flex;align-items:center;gap:6px}
.btn-primary:hover{opacity:.85}
.btn-secondary{padding:8px 16px;background:var(--bg-tertiary);color:var(--text-primary);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:.875rem;font-weight:500}
.btn-secondary:hover{background:var(--border)}
.btn-danger{padding:8px 16px;background:var(--danger);color:#fff;border:none;border-radius:var(--radius-sm);cursor:pointer;font-size:.875rem;font-weight:600}

/* FORMS */
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.78rem;font-weight:600;color:var(--text-secondary);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-size:.9rem;outline:none;transition:border-color var(--transition);font-family:var(--font)}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group textarea{min-height:100px;resize:vertical}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.color-picker,.icon-picker{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.color-opt{width:28px;height:28px;border-radius:50%;border:2px solid transparent;cursor:pointer;background:var(--c);transition:transform var(--transition)}
.color-opt:hover{transform:scale(1.2)}
.color-opt.active{border-color:#fff;transform:scale(1.1)}
.icon-opt{width:36px;height:36px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-tertiary);color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem;transition:all var(--transition)}
.icon-opt:hover,.icon-opt.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* MODAL */
#modalBackdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500}
#modalBackdrop.show{display:block}
#modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.95);background:var(--card-bg);border:1px solid var(--border-strong);border-radius:var(--radius);padding:24px;z-index:600;width:90%;max-width:500px;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow);transition:transform .2s}
#modal.show{display:block;transform:translate(-50%,-50%) scale(1)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
#modalTitle{font-size:1.1rem;font-weight:700}
#modalClose{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1.1rem;padding:4px}
#modalClose:hover{color:var(--text-primary)}

/* TOAST */
#toastContainer{position:fixed;bottom:80px;right:20px;z-index:800;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:10px;background:var(--bg-secondary);border:1px solid var(--border-strong);color:var(--text-primary);font-size:.875rem;min-width:220px;max-width:320px;box-shadow:var(--shadow);animation:toastIn .3s ease;pointer-events:all}
.toast.success i{color:#10b981}.toast.error i{color:#f85149}.toast.info i{color:var(--accent)}
.toast.hide{animation:toastOut .3s ease forwards}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}}
@keyframes toastOut{to{opacity:0;transform:translateX(20px)}}

/* UTILS */
.empty-state{display:flex;flex-direction:column;align-items:center;gap:10px;padding:48px 20px;color:var(--text-muted);text-align:center}
.empty-state i{font-size:2rem;opacity:.4}
.empty-state p{font-size:.875rem}
.progress-bar{height:6px;background:var(--bg-tertiary);border-radius:999px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:999px;transition:width .4s ease}
.muted{color:var(--text-muted)}

/* HEATMAP */
.hm-cell{width:13px;height:13px;border-radius:2px;background:var(--bg-tertiary);flex-shrink:0;cursor:default}
.hm-cell.l1{background:rgba(var(--accent-rgb),.2)}
.hm-cell.l2{background:rgba(var(--accent-rgb),.45)}
.hm-cell.l3{background:rgba(var(--accent-rgb),.7)}
.hm-cell.l4{background:var(--accent)}

/* ── DASHBOARD ── */
.hero{background:linear-gradient(135deg,rgba(var(--accent-rgb),.08) 0%,transparent 60%);border:1px solid rgba(var(--accent-rgb),.12);border-radius:var(--radius);padding:28px;margin-bottom:20px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(var(--accent-rgb),.15) 0%,transparent 70%)}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:20px}
#heroGreeting{font-size:1.6rem;font-weight:800;letter-spacing:-.5px}
#heroDate{color:var(--text-secondary);font-size:.875rem;margin-top:4px}
.hero-clock{text-align:right;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 16px}
#clockTime{font-size:1.2rem;font-weight:700;font-variant-numeric:tabular-nums;color:var(--accent)}
#clockDate{font-size:.75rem;color:var(--text-muted)}
#heroQuote{padding:14px;background:rgba(0,0,0,.2);border-radius:var(--radius-sm);border-left:3px solid var(--accent);margin-bottom:16px}
#heroQuote p{font-size:.875rem;color:var(--text-secondary);font-style:italic}
.tip-bar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(var(--accent-rgb),.08);border-radius:var(--radius-sm)}
.tip-bar i{color:var(--accent);flex-shrink:0}
#dashTip{font-size:.82rem;color:var(--text-secondary);flex:1}
#newTipBtn{background:none;border:none;color:var(--accent);cursor:pointer;font-size:.8rem;white-space:nowrap}
.quick-actions{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.qa-btn{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;color:var(--text-secondary);font-size:.8rem;font-weight:500;transition:all var(--transition)}
.qa-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(var(--accent-rgb),.05)}
.qa-btn i{font-size:1.2rem}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.stat-label{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:6px}
.stat-value{font-size:1.4rem;font-weight:800;color:var(--accent);letter-spacing:-.5px}
.stat-sub{font-size:.78rem;color:var(--text-muted);margin-top:2px}
.progress-section{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.prod-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:20px;display:flex;align-items:center;gap:20px}
.prod-ring-wrap{position:relative;width:80px;height:80px;flex-shrink:0}
.prod-ring-wrap svg{width:80px;height:80px}
.prod-score-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:800}
.overall-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.overall-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.overall-title{font-size:.875rem;font-weight:600;color:var(--text-secondary)}
#overallBadge{font-size:.875rem;font-weight:700;color:var(--accent)}
#overallMeta{font-size:.78rem;color:var(--text-muted);margin-top:8px}
.dash-bottom{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.chart-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.chart-title{font-size:.875rem;font-weight:600;color:var(--text-secondary);margin-bottom:16px;display:flex;align-items:center;gap:6px}
.chart-wrap{height:180px;position:relative}
#dashHeatmap{display:flex;flex-wrap:wrap;gap:3px}

/* ── SUBJECTS ── */
#subjectsGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.subject-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:20px;position:relative;overflow:hidden}
.subject-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--subject-color,var(--accent))}
.subject-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.subject-icon-wrap{width:40px;height:40px;border-radius:10px;background:rgba(var(--accent-rgb),.1);display:flex;align-items:center;justify-content:center;color:var(--subject-color,var(--accent));font-size:1.1rem}
.subject-actions{display:flex;gap:4px}
.subject-actions button{background:none;border:none;color:var(--text-muted);cursor:pointer;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.8rem;transition:all var(--transition)}
.subject-actions button:hover{background:var(--bg-tertiary);color:var(--text-primary)}
.subject-actions button.del:hover{color:var(--danger)}
.subject-name{font-size:1rem;font-weight:700;margin-bottom:4px}
.subject-meta{font-size:.78rem;color:var(--text-muted);margin-bottom:12px}
.subject-progress-text{display:flex;justify-content:space-between;font-size:.8rem;color:var(--text-secondary);margin-bottom:6px}

/* ── TIMER ── */
.timer-layout{display:grid;grid-template-columns:370px 1fr;gap:20px;align-items:start}
.timer-main{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:28px}
.mode-btns{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.mode-btn{padding:6px 14px;border-radius:999px;border:1px solid var(--border);background:none;color:var(--text-secondary);cursor:pointer;font-size:.8rem;font-weight:500;transition:all var(--transition)}
.mode-btn.active,.mode-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
#customTimer{display:none;gap:10px;margin-bottom:16px}
#customTimer input{width:90px;padding:8px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);text-align:center}
.timer-ring-wrap{position:relative;width:220px;height:220px;margin:0 auto 24px}
.timer-ring-wrap svg{width:100%;height:100%}
.timer-display{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.timer-digits{font-size:3rem;font-weight:800;letter-spacing:-2px;font-variant-numeric:tabular-nums}
#timerPhase{font-size:.8rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.1em;margin-top:2px}
.timer-controls{display:flex;gap:8px;justify-content:center;margin-bottom:20px}
.timer-controls button{padding:10px 20px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-tertiary);color:var(--text-primary);cursor:pointer;font-size:.875rem;font-weight:600;transition:all var(--transition);display:flex;align-items:center;gap:6px}
#timerStart{background:var(--accent);color:#fff;border-color:var(--accent)}
#timerStart:hover{opacity:.85}
#timerSubject{width:100%;padding:9px 12px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-size:.875rem;outline:none}
.timer-history{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:20px;max-height:520px;overflow-y:auto}
.timer-history-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.history-title{font-size:.875rem;font-weight:600}
.session-count-badge{background:rgba(var(--accent-rgb),.15);color:var(--accent);padding:2px 8px;border-radius:999px;font-size:.78rem;font-weight:600}
.session-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.session-item:last-child{border-bottom:none}
.session-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.session-info{flex:1}
.session-subject{font-size:.875rem;font-weight:500}
.session-time{font-size:.75rem;color:var(--text-muted);margin-top:1px}
.session-duration{font-size:.875rem;font-weight:600;color:var(--accent)}

/* ── TASKS ── */
.task-progress-bar{padding:14px;background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;display:flex;align-items:center;gap:12px}
#taskProgressText{font-size:.82rem;color:var(--text-secondary);white-space:nowrap}
.task-input-row{display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
.task-input-row input{flex:1;min-width:160px;padding:10px 14px;background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-size:.9rem;outline:none}
.task-input-row select{padding:10px 12px;background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-size:.875rem;outline:none}
.filter-bar{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.filter-btn{padding:6px 14px;border-radius:999px;border:1px solid var(--border);background:none;color:var(--text-secondary);cursor:pointer;font-size:.8rem;transition:all var(--transition)}
.filter-btn.active{background:rgba(var(--accent-rgb),.15);color:var(--accent);border-color:rgba(var(--accent-rgb),.3)}
.task-item{display:flex;align-items:center;gap:12px;padding:14px;background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;transition:opacity var(--transition)}
.task-item.completed{opacity:.5}
.task-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border-strong);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.7rem;transition:all var(--transition)}
.task-check.done{background:var(--accent);border-color:var(--accent);color:#fff}
.task-content{flex:1}
.task-title{font-size:.9rem;font-weight:500;margin-bottom:4px}
.task-item.completed .task-title{text-decoration:line-through}
.task-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.task-priority{padding:2px 8px;border-radius:4px;font-size:.72rem;font-weight:600;text-transform:uppercase}
.task-priority.high{background:rgba(248,81,73,.15);color:#f85149}
.task-priority.medium{background:rgba(234,179,8,.15);color:#eab308}
.task-priority.low{background:rgba(59,130,246,.15);color:#3b82f6}
.task-subject-tag{display:flex;align-items:center;gap:4px;font-size:.78rem;color:var(--text-muted)}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.task-meta span{font-size:.78rem;color:var(--text-muted);display:flex;align-items:center;gap:4px}
.task-actions{display:flex;gap:4px}
.task-actions button{background:none;border:none;color:var(--text-muted);cursor:pointer;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.8rem;transition:all var(--transition)}
.task-actions button:hover{background:var(--bg-tertiary);color:var(--text-primary)}
.task-actions button.del:hover{color:var(--danger)}

/* ── CALENDAR ── */
.calendar-layout{display:grid;grid-template-columns:1fr 320px;gap:20px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-nav button{background:none;border:1px solid var(--border);color:var(--text-primary);cursor:pointer;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.85rem}
#calMonthYear{font-weight:700;font-size:1rem}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:8px}
.cal-weekday{text-align:center;font-size:.72rem;color:var(--text-muted);font-weight:600;padding:4px}
#calendarGrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.85rem;transition:all var(--transition);border:1px solid transparent}
.cal-day:hover:not(.empty){background:var(--bg-tertiary)}
.cal-day.today{background:var(--accent);color:#fff;font-weight:700}
.cal-day.has-study:not(.today){border-color:rgba(var(--accent-rgb),.4);color:var(--accent)}
.cal-day.selected:not(.today){background:rgba(var(--accent-rgb),.15)}
.cal-day.empty{cursor:default}
.cal-detail{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
#calDetailDate{font-size:.875rem;font-weight:600;color:var(--text-secondary);margin-bottom:12px}
.cal-note{margin-top:16px}
.cal-note textarea{width:100%;padding:9px 12px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-size:.875rem;resize:vertical;min-height:80px;font-family:var(--font);outline:none}

/* ── NOTES ── */
.notes-toolbar{display:flex;gap:10px;margin-bottom:16px;align-items:center}
.notes-toolbar input{flex:1;padding:9px 14px;background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-size:.875rem;outline:none}
#notesGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
.note-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:18px;position:relative}
.note-card.pinned{border-color:rgba(var(--accent-rgb),.3)}
.note-pin{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:.85rem;transition:color var(--transition)}
.note-pin.active{color:var(--accent)}
.note-title{font-size:.95rem;font-weight:700;margin-bottom:8px;padding-right:24px}
.note-content{font-size:.82rem;color:var(--text-secondary);line-height:1.6;max-height:100px;overflow:hidden;margin-bottom:10px}
.note-date{font-size:.72rem;color:var(--text-muted);display:flex;align-items:center;gap:4px;margin-bottom:10px}
.note-actions{display:flex;gap:8px}
.note-actions button{flex:1;padding:6px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--text-secondary);cursor:pointer;font-size:.78rem;transition:all var(--transition);display:flex;align-items:center;justify-content:center;gap:4px}
.note-actions button:hover{background:var(--bg-tertiary);color:var(--text-primary)}
.note-actions button.del:hover{color:var(--danger)}
.rich-toolbar{display:flex;gap:4px;padding:6px;background:var(--bg-tertiary);border:1px solid var(--border);border-bottom:none;border-radius:var(--radius-sm) var(--radius-sm) 0 0}
.rich-toolbar button{background:none;border:none;color:var(--text-secondary);cursor:pointer;width:28px;height:28px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:.85rem}
.rich-toolbar button:hover{background:var(--border);color:var(--text-primary)}
.rich-editor{min-height:120px;padding:10px 12px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:0 0 var(--radius-sm) var(--radius-sm);color:var(--text-primary);font-size:.9rem;outline:none;line-height:1.6}

/* ── ANALYTICS ── */
.analytics-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.ana-stat{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.ana-stat-label{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted)}
.ana-stat-value{font-size:1.5rem;font-weight:800;color:var(--accent);margin-top:4px}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* ── ACHIEVEMENTS ── */
#achievementsGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:12px}
.ach-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-align:center;transition:all var(--transition)}
.ach-card.locked{opacity:.35;filter:grayscale(1)}
.ach-card.unlocked{border-color:rgba(var(--accent-rgb),.4)}
.ach-icon{font-size:1.8rem;color:var(--accent);margin-bottom:10px}
.ach-name{font-size:.875rem;font-weight:700;margin-bottom:4px}
.ach-desc{font-size:.75rem;color:var(--text-muted);margin-bottom:8px}
.ach-status{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--accent)}
.ach-card.locked .ach-status{color:var(--text-muted)}
#achProgressFill+span,.ach-progress{display:flex;align-items:center;gap:10px;margin-top:8px}
#achProgressText{font-size:.82rem;color:var(--text-secondary);white-space:nowrap}

/* ── STREAKS ── */
.streak-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.streak-stat{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.streak-stat-value{font-size:2rem;font-weight:800;color:var(--accent)}
.streak-stat-label{font-size:.78rem;color:var(--text-muted);margin-top:4px}
.heatmap-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:20px}

/* ── GOALS ── */
.goal-tabs{display:flex;gap:6px;margin-bottom:16px}
.goal-tab{padding:6px 16px;border-radius:999px;border:1px solid var(--border);background:none;color:var(--text-secondary);cursor:pointer;font-size:.82rem;font-weight:500;transition:all var(--transition)}
.goal-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.goal-card{display:flex;align-items:flex-start;gap:12px;padding:16px;background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px}
.goal-card.completed{opacity:.6}
.goal-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--border-strong);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.75rem;transition:all var(--transition);margin-top:2px}
.goal-check.done{background:var(--accent);border-color:var(--accent);color:#fff}
.goal-content{flex:1}
.goal-title{font-size:.9rem;font-weight:600;margin-bottom:4px}
.goal-meta{font-size:.78rem;color:var(--text-muted);margin-bottom:8px}
.goal-progress-wrap{display:flex;align-items:center;gap:8px}
.goal-progress-wrap .progress-bar{flex:1}
.goal-progress-wrap input{width:60px;padding:4px 6px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:4px;color:var(--text-primary);font-size:.82rem;text-align:center;outline:none}
.goal-actions{display:flex;gap:4px}
.goal-actions button{background:none;border:none;color:var(--text-muted);cursor:pointer;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.8rem;transition:all var(--transition)}
.goal-actions button:hover{background:var(--bg-tertiary)}
.goal-actions button.del:hover{color:var(--danger)}

/* ── FLASHCARDS ── */
.flashcard-toolbar{display:flex;gap:10px;margin-bottom:20px;align-items:center;flex-wrap:wrap}
.flashcard-toolbar input{flex:1;min-width:180px;padding:8px 12px;background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-size:.875rem;outline:none}
.flashcard-toolbar button{padding:8px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card-bg);color:var(--text-secondary);cursor:pointer;font-size:.82rem;transition:all var(--transition);display:flex;align-items:center;gap:6px}
.flashcard-toolbar button:hover{border-color:var(--accent);color:var(--accent)}
.flashcard-toolbar button.active{background:rgba(var(--accent-rgb),.15);color:var(--accent);border-color:rgba(var(--accent-rgb),.4)}
.flashcard-area{max-width:600px;margin:0 auto}
#flashcard{perspective:1000px;cursor:pointer;width:100%;height:260px;margin-bottom:16px}
.card-inner{position:relative;width:100%;height:100%;transition:transform .6s;transform-style:preserve-3d}
#flashcard.flipped .card-inner{transform:rotateY(180deg)}
.card-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center}
.card-front{background:var(--card-bg);border:1px solid var(--border-strong)}
.card-back{background:var(--accent);color:#fff;transform:rotateY(180deg)}
.card-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;opacity:.55;margin-bottom:12px}
#cardFront,#cardBack{font-size:1rem;font-weight:600;line-height:1.5}
.card-controls{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px}
.card-controls button{padding:8px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card-bg);color:var(--text-primary);cursor:pointer;font-size:.875rem;transition:all var(--transition);display:flex;align-items:center;gap:6px}
.card-controls button:hover{border-color:var(--accent)}
#cardCounter{font-size:.875rem;color:var(--text-muted);font-weight:600;min-width:60px;text-align:center}
.card-actions{display:flex;gap:8px;justify-content:center}
.card-actions button{padding:8px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card-bg);color:var(--text-secondary);cursor:pointer;font-size:.82rem;transition:all var(--transition);display:flex;align-items:center;gap:6px}
#markDifficult.active{color:#f59e0b;border-color:#f59e0b}
#deleteCard:hover{color:var(--danger);border-color:var(--danger)}

/* ── PLANNER ── */
#plannerGrid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.planner-day-header{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);padding:6px 4px;text-align:center}
.planner-day-header.today{color:var(--accent)}
.planner-blocks{min-height:120px;border:1px dashed var(--border);border-radius:var(--radius-sm);padding:6px;display:flex;flex-direction:column;gap:4px;transition:all var(--transition)}
.planner-blocks.drag-over{border-color:var(--accent);background:rgba(var(--accent-rgb),.05)}
.planner-block{background:rgba(var(--accent-rgb),.12);border:1px solid rgba(var(--accent-rgb),.25);border-radius:6px;padding:6px 8px;cursor:pointer;position:relative;transition:all var(--transition)}
.planner-block:hover{background:rgba(var(--accent-rgb),.2)}
.planner-block.dragging{opacity:.5}
.planner-block-del{position:absolute;top:2px;right:2px;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:.7rem;display:none}
.planner-block:hover .planner-block-del{display:block}
.planner-block-time{font-size:.68rem;color:var(--text-muted)}
.planner-block-title{font-size:.78rem;font-weight:600;margin-top:2px}
.planner-add-block{background:none;border:1px dashed var(--border);border-radius:6px;width:100%;padding:6px;color:var(--text-muted);cursor:pointer;font-size:.72rem;transition:all var(--transition);display:flex;align-items:center;justify-content:center;gap:4px;margin-top:auto}
.planner-add-block:hover{border-color:var(--accent);color:var(--accent)}

/* ── SETTINGS ── */
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.settings-section{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.settings-section-title{font-size:.875rem;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.settings-section-title i{color:var(--accent)}
.option-row{display:flex;gap:8px;flex-wrap:wrap}
.theme-opt{padding:8px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:none;color:var(--text-secondary);cursor:pointer;font-size:.875rem;transition:all var(--transition);display:flex;align-items:center;gap:6px}
.theme-opt.active,.theme-opt:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.fs-opt{padding:8px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:none;color:var(--text-secondary);cursor:pointer;font-size:.875rem;transition:all var(--transition)}
.fs-opt.active{background:rgba(var(--accent-rgb),.15);color:var(--accent);border-color:rgba(var(--accent-rgb),.4)}
.data-actions{display:flex;flex-direction:column;gap:8px}
.data-actions button{padding:10px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:none;color:var(--text-secondary);cursor:pointer;font-size:.875rem;text-align:left;display:flex;align-items:center;gap:10px;transition:all var(--transition)}
.data-actions button:hover{background:var(--bg-tertiary);color:var(--text-primary)}
#clearData:hover{color:var(--danger);border-color:var(--danger)}
kbd{display:inline-block;padding:2px 6px;background:var(--bg-tertiary);border:1px solid var(--border-strong);border-radius:4px;font-size:.78rem;font-family:monospace;color:var(--text-secondary)}

/* ── BOTTOM NAV ── */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg-secondary);border-top:1px solid var(--border);padding:8px 0;z-index:50}
.bn-items{display:flex;align-items:center;justify-content:space-around}
.bn-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 8px;border:none;background:none;color:var(--text-muted);cursor:pointer;font-size:.68rem;border-radius:var(--radius-sm);transition:color var(--transition);text-decoration:none}
.bn-item i{font-size:1.1rem}
.bn-item.active{color:var(--accent)}
#moreMenu{display:none;position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--card-bg);border:1px solid var(--border-strong);border-radius:var(--radius);padding:12px;z-index:200;box-shadow:var(--shadow);min-width:200px}
#moreMenu.show{display:block}
.more-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.more-header span{font-size:.78rem;font-weight:600;color:var(--text-muted)}
#closeMore{background:none;border:none;color:var(--text-muted);cursor:pointer}
.more-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;color:var(--text-secondary);font-size:.875rem;transition:all var(--transition);text-decoration:none;border:none;background:none;width:100%;text-align:left}
.more-item:hover{background:var(--bg-tertiary);color:var(--text-primary)}
.more-item i{width:16px;text-align:center;font-size:.85rem}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  #sidebar{position:fixed;left:-100%;top:0;bottom:0;transition:left .2s;z-index:200}
  #sidebar.open{left:0}
  #sidebarClose{display:block}
  #menuToggle{display:flex}
  .bottom-nav{display:block}
  .content{padding-bottom:70px}
  .timer-layout,.calendar-layout{grid-template-columns:1fr}
  .stats-row,.progress-section{grid-template-columns:1fr 1fr}
  .quick-actions{grid-template-columns:repeat(2,1fr)}
  .dash-bottom,.analytics-stats,.charts-grid,.settings-grid,.streak-stats{grid-template-columns:1fr}
  #plannerGrid{grid-template-columns:repeat(4,1fr)}
}
@media(max-width:600px){
  .section{padding:16px}
  .stats-row{grid-template-columns:1fr 1fr}
  .search-wrap{display:none}
  #plannerGrid{grid-template-columns:repeat(2,1fr)}
}
.focus-mode #sidebar,.focus-mode .topbar,.focus-mode .bottom-nav{display:none}
</style>
</head>
<body>
<div id="loader"><div class="loader-inner"><div class="loader-logo">Study<span>Flow</span></div><div class="loader-spinner"></div></div></div>
<div id="modalBackdrop"></div>
<div id="modal">
  <div class="modal-header"><div id="modalTitle"></div><button id="modalClose"><i class="fas fa-times"></i></button></div>
  <div id="modalBody"></div>
</div>
<div id="toastContainer"></div>
<div id="moreMenu">
  <div class="more-header"><span>More</span><button id="closeMore"><i class="fas fa-times"></i></button></div>
  <button class="more-item" data-section="analytics"><i class="fas fa-chart-bar"></i> Analytics</button>
  <button class="more-item" data-section="achievements"><i class="fas fa-trophy"></i> Achievements</button>
  <button class="more-item" data-section="streaks"><i class="fas fa-fire"></i> Streaks</button>
  <button class="more-item" data-section="goals"><i class="fas fa-bullseye"></i> Goals</button>
  <button class="more-item" data-section="planner"><i class="fas fa-calendar-week"></i> Planner</button>
  <button class="more-item" data-section="settings"><i class="fas fa-gear"></i> Settings</button>
</div>
<div class="app-wrapper">
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">Study<span>Flow</span></div>
      <button id="sidebarClose"><i class="fas fa-times"></i></button>
    </div>
    <nav>
      <div class="nav-label">Main</div>
      <button class="nav-item active" data-section="dashboard"><i class="fas fa-house"></i> Dashboard</button>
      <button class="nav-item" data-section="subjects"><i class="fas fa-book-open"></i> Subjects</button>
      <button class="nav-item" data-section="timer"><i class="fas fa-stopwatch"></i> Timer</button>
      <button class="nav-item" data-section="tasks"><i class="fas fa-check-square"></i> Tasks</button>
      <div class="nav-div"></div>
      <div class="nav-label">Organize</div>
      <button class="nav-item" data-section="calendar"><i class="fas fa-calendar"></i> Calendar</button>
      <button class="nav-item" data-section="planner"><i class="fas fa-calendar-week"></i> Planner</button>
      <button class="nav-item" data-section="goals"><i class="fas fa-bullseye"></i> Goals</button>
      <div class="nav-div"></div>
      <div class="nav-label">Learn</div>
      <button class="nav-item" data-section="notes"><i class="fas fa-sticky-note"></i> Notes</button>
      <button class="nav-item" data-section="flashcards"><i class="fas fa-layer-group"></i> Flashcards</button>
      <div class="nav-div"></div>
      <div class="nav-label">Progress</div>
      <button class="nav-item" data-section="analytics"><i class="fas fa-chart-bar"></i> Analytics</button>
      <button class="nav-item" data-section="achievements"><i class="fas fa-trophy"></i> Achievements</button>
      <button class="nav-item" data-section="streaks"><i class="fas fa-fire"></i> Streaks</button>
      <div class="nav-div"></div>
      <button class="nav-item" data-section="settings"><i class="fas fa-gear"></i> Settings</button>
    </nav>
    <div class="sidebar-footer">
      <div class="streak-badge"><i class="fas fa-fire"></i><div class="streak-badge-text"><strong id="sidebarStreak">0</strong> day streak</div></div>
    </div>
  </aside>
  <div id="sidebarOverlay"></div>
  <div class="main">
    <div class="topbar">
      <button id="menuToggle"><i class="fas fa-bars"></i></button>
      <div class="search-wrap"><i class="fas fa-search"></i><input type="text" id="globalSearch" placeholder="Search... (press /)"></div>
      <div class="topbar-spacer"></div>
      <div class="topbar-actions">
        <button class="icon-btn" id="themeToggle" title="Toggle theme"><i class="fas fa-moon"></i></button>
        <div class="accent-wrap">
          <button class="icon-btn" id="accentBtn" title="Accent color"><i class="fas fa-palette"></i></button>
          <div id="accentDropdown">
            <button class="accent-opt" data-accent="emerald" title="Emerald"></button>
            <button class="accent-opt" data-accent="blue" title="Blue"></button>

// ---------- Helpers ----------
function uid(prefix = 'id') { return prefix + '_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8); }
function todayKey() { return new Date().toISOString().split('T')[0]; }
function dateKey(d) { return new Date(d).toISOString().split('T')[0]; }
function fmtDate(d, opts) { return new Date(d).toLocaleDateString('en-US', opts || { month: 'short', day: 'numeric', year: 'numeric' }); }
function fmtTime(d) { return new Date(d).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }); }
function fmtDuration(min) {
  if (min < 60) return min + 'm';
  const h = Math.floor(min / 60);
  const m = Math.round(min % 60);
  return m === 0 ? h + 'h' : h + 'h ' + m + 'm';
}
function totalHours(d) { return d.sessions.reduce((s, x) => s + x.duration, 0) / 60; }
function dailyHoursMax(d) {
  const byDay = {};
  d.sessions.forEach(s => {
    const k = dateKey(s.date);
    byDay[k] = (byDay[k] || 0) + s.duration;
  });
  return Math.max(0, ...Object.values(byDay)) / 60;
}
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}
function getGreeting() {
  const h = new Date().getHours();
  if (h < 12) return 'Good morning, scholar';
  if (h < 18) return 'Good afternoon, scholar';
  return 'Good evening, scholar';
}

// ---------- Audio ----------
const AudioMgr = {
  ctx: null,
  ambienceNode: null,
  init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
  beep() {
    this.init();
    const now = this.ctx.currentTime;
    [800, 1000, 800].forEach((freq, i) => {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.connect(gain); gain.connect(this.ctx.destination);
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, now + i * 0.2);
      gain.gain.linearRampToValueAtTime(0.25, now + i * 0.2 + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.2 + 0.18);
      osc.start(now + i * 0.2);
      osc.stop(now + i * 0.2 + 0.2);
    });
  },
  startAmbience() {
    this.init();
    if (this.ambienceNode) return;
    const bufferSize = 2 * this.ctx.sampleRate;
    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const output = buffer.getChannelData(0);
    let lastOut = 0;
    for (let i = 0; i < bufferSize; i++) {
      const white = Math.random() * 2 - 1;
      output[i] = (lastOut + 0.02 * white) / 1.02;
      lastOut = output[i];
      output[i] *= 3.5;
    }
    const source = this.ctx.createBufferSource();
    source.buffer = buffer;
    source.loop = true;
    const gain = this.ctx.createGain();
    gain.gain.value = 0.15;
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 600;
    source.connect(filter); filter.connect(gain); gain.connect(this.ctx.destination);
    source.start();
    this.ambienceNode = { source, gain };
  },
  stopAmbience() {
    if (this.ambienceNode) {
      this.ambienceNode.source.stop();
      this.ambienceNode = null;
    }
  }
};

// ---------- Streaks Logic ----------
const Streaks = {
  recompute() {
    const d = State.data;
    const studyDays = new Set(d.sessions.map(s => dateKey(s.date)));
    const sortedDays = Array.from(studyDays).sort();
    if (sortedDays.length === 0) {
      d.streak.current = 0; d.streak.longest = 0; d.streak.history = [];
      return;
    }
    d.streak.history = sortedDays;
    // Compute longest
    let longest = 1, current = 1;
    for (let i = 1; i < sortedDays.length; i++) {
      const prev = new Date(sortedDays[i - 1]);
      const curr = new Date(sortedDays[i]);
      const diff = (curr - prev) / (1000 * 60 * 60 * 24);
      // FIX 1: Use Math.round() to avoid DST floating-point errors where a
      // "1-day" difference might be 0.958 or 1.042 instead of exactly 1.
      if (Math.round(diff) === 1) { current++; longest = Math.max(longest, current); }
      else { current = 1; }
    }
    d.streak.longest = longest;
    // Compute current
    const today = todayKey();
    const yesterday = dateKey(new Date(Date.now() - 86400000));
    if (studyDays.has(today)) {
      let cur = 1;
      let dt = new Date();
      for (let i = 1; i < 365; i++) {
        dt = new Date(dt.getTime() - 86400000);
        if (studyDays.has(dateKey(dt))) cur++;
        else break;
      }
      d.streak.current = cur;
    } else if (studyDays.has(yesterday)) {
      let cur = 0;
      let dt = new Date();
      for (let i = 1; i < 365; i++) {
        dt = new Date(dt.getTime() - 86400000);
        if (studyDays.has(dateKey(dt))) cur++;
        else break;
      }
      d.streak.current = cur;
    } else {
      d.streak.current = 0;
    }
  },
  missedDays30() {
    const studyDays = new Set(State.data.sessions.map(s => dateKey(s.date)));
    let missed = 0;
    for (let i = 0; i < 30; i++) {
      const dt = new Date(Date.now() - i * 86400000);
      if (!studyDays.has(dateKey(dt))) missed++;
    }
    return missed;
  }
};

    document.getElementById('statWeekHours').textContent = (weekMin / 60).toFixed(1) + 'h';

    document.getElementById('statTotalHours').textContent = (totalMin / 60).toFixed(1) + 'h';

    const completedSubjects = d.subjects.filter(s => {
      const weeklyMin = d.sessions.filter(x => x.subjectId === s.id && new Date(x.date) >= weekStart).reduce((sum, x) => sum + x.duration, 0);
      return weeklyMin >= s.weeklyGoal * 60;
    }).length;
    document.getElementById('statSubjectsDone').textContent = completedSubjects;
    document.getElementById('statSubjectsTotal').textContent = 'of ' + d.subjects.length + ' subjects';
    const tasksToday = d.tasks.filter(t => dateKey(t.date) === today);
    const tasksDone = tasksToday.filter(t => t.completed).length;
    const overallPct = tasksToday.length > 0 ? Math.round((tasksDone / tasksToday.length) * 100) : 0;
    document.getElementById('overallProgress').style.width = overallPct + '%';
    document.getElementById('overallBadge').textContent = overallPct + '%';
    document.getElementById('overallMeta').textContent = tasksDone + ' / ' + tasksToday.length + ' tasks today';
    const productivity = this.computeProductivity();
    document.getElementById('productivityScore').textContent = productivity;
    const circumference = 2 * Math.PI * 52;
    document.getElementById('productivityRing').style.strokeDashoffset = circumference - (productivity / 100) * circumference;
    document.getElementById('sidebarStreak').textContent = d.streak.current;
    document.getElementById('dashStreak').textContent = d.streak.current + ' days';
  },
  computeProductivity() {
    const d = State.data;
    let score = 0;
    score += Math.min(30, d.streak.current * 4);
    const todayMin = d.sessions.filter(s => dateKey(s.date) === todayKey()).reduce((sum, s) => sum + s.duration, 0);
    score += Math.min(30, (todayMin / 60) * 6);
    const todayTasks = d.tasks.filter(t => dateKey(t.date) === todayKey());
    if (todayTasks.length > 0) {
      score += Math.round((todayTasks.filter(t => t.completed).length / todayTasks.length) * 20);
    }
    const dailyGoals = d.goals.filter(g => g.type === 'daily');
    if (dailyGoals.length > 0) {
      const avgProgress = dailyGoals.reduce((sum, g) => sum + Math.min(100, (g.progress / g.target) * 100), 0) / dailyGoals.length;
      score += Math.round((avgProgress / 100) * 20);
    }
    return Math.min(100, Math.round(score));
  },

    });
    for (let i = 44; i >= 0; i--) {
      const dt = new Date(Date.now() - i * 86400000);
      const k = dateKey(dt);
      const min = studyDays[k] || 0;
      const cell = document.createElement('div');
      cell.className = 'hm-cell';
      if (min > 0) {
        if (min < 30) cell.classList.add('l1');
        else if (min < 60) cell.classList.add('l2');
        else if (min < 120) cell.classList.add('l3');
        else cell.classList.add('l4');
      }
      cell.title = fmtDate(dt) + ': ' + fmtDuration(min);
      container.appendChild(cell);
    }

    // subject, so the UI reflects the default values held in chosenColor/chosenIcon.
    const colorHTML = SUBJECT_COLORS.map((c, i) => `<button class="color-opt ${subj ? (subj.color === c ? 'active' : '') : (i === 0 ? 'active' : '')}" data-color="${c}" style="--c:${c}"></button>`).join('');
    const iconHTML = SUBJECT_ICONS.map((ic, i) => `<button class="icon-opt ${subj ? (subj.icon === ic ? 'active' : '') : (i === 0 ? 'active' : '')}" data-icon="${ic}"><i class="fas ${ic}"></i></button>`).join('');
    UI.modal(id ? 'Edit Subject' : 'Add Subject', `
      <div class="form-group">
        <label>Subject Name</label>
        <input type="text" id="subjName" value="${subj ? escapeHtml(subj.name) : ''}" placeholder="e.g. Biology">
      </div>
      <div class="form-group">
        <label>Weekly Goal (hours)</label>
        <input type="number" id="subjGoal" min="1" max="100" value="${subj ? subj.weeklyGoal : 5}">
      </div>
      <div class="form-group">
        <label>Color</label>
        <div class="color-picker" id="colorPicker">${colorHTML}</div>
      </div>
      <div class="form-group">
        <label>Icon</label>
        <div class="icon-picker" id="iconPicker">${iconHTML}</div>
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="UI.closeModal()">Cancel</button>
        <button class="btn-primary" id="saveSubject">${id ? 'Save' : 'Add Subject'}</button>
      </div>
    `);
    let chosenColor = subj ? subj.color : SUBJECT_COLORS[0];
    let chosenIcon = subj ? subj.icon : SUBJECT_ICONS[0];
    document.querySelectorAll('#colorPicker .color-opt').forEach(b => {
      b.onclick = () => {
        document.querySelectorAll('#colorPicker .color-opt').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        chosenColor = b.dataset.color;
      };
    });
    document.querySelectorAll('#iconPicker .icon-opt').forEach(b => {
      b.onclick = () => {
        document.querySelectorAll('#iconPicker .icon-opt').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        chosenIcon = b.dataset.icon;
      };
    });
    document.getElementById('saveSubject').onclick = () => {
      const name = document.getElementById('subjName').value.trim();
      const goal = parseInt(document.getElementById('subjGoal').value) || 5;
      if (!name) { UI.toast('Please enter a subject name', 'error'); return; }
      if (id) {
        const s = State.data.subjects.find(x => x.id === id);
        s.name = name; s.color = chosenColor; s.icon = chosenIcon; s.weeklyGoal = goal;
        UI.toast('Subject updated', 'success');
      } else {
        State.data.subjects.push({ id: uid('s'), name, color: chosenColor, icon: chosenIcon, weeklyGoal: goal, totalHours: 0 });
        UI.toast('Subject added', 'success');
      }
      State.save();
      UI.closeModal();
      this.render();
      Achievements.check();
      App.refreshAll();
    };
  },
  delete(id) {
    UI.confirm('Delete this subject? Related sessions will remain but unlinked.').then(ok => {
      if (!ok) return;
      State.data.subjects = State.data.subjects.filter(s => s.id !== id);
      State.save();
      this.render();
      App.refreshAll();
      UI.toast('Subject deleted', 'success');
    });
  }
};

// ---------- Timer ----------
const Timer = {
  mode: 'pomodoro',
  duration: 25 * 60,
  remaining: 25 * 60,
  isRunning: false,
  isPaused: false,
  interval: null,
  phase: 'focus',
  selectedSubject: null,
  init() {
    document.querySelectorAll('.mode-btn').forEach(b => {
      b.onclick = () => this.setMode(b.dataset.mode);
    });
    document.getElementById('timerStart').onclick = () => this.toggle();
    document.getElementById('timerReset').onclick = () => this.reset();
    document.getElementById('timerStop').onclick = () => this.stop();
    document.getElementById('timerSubject').onchange = (e) => { this.selectedSubject = e.target.value; };
  },
  render() {
    const sel = document.getElementById('timerSubject');
    const current = sel.value;
    sel.innerHTML = State.data.subjects.map(s => `<option value="${s.id}">${escapeHtml(s.name)}</option>`).join('');
    if (current && State.data.subjects.find(s => s.id === current)) sel.value = current;
    this.selectedSubject = sel.value;
    this.renderDisplay();
    this.renderHistory();
  },
  setMode(mode) {
    this.mode = mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
    document.getElementById('customTimer').style.display = mode === 'custom' ? 'flex' : 'none';
    const presets = { pomodoro: 25, short: 15, long: 50 };
    const mins = mode === 'custom' ? parseInt(document.getElementById('customMinutes').value) || 30 : presets[mode];
    this.duration = mins * 60;
    this.remaining = mins * 60;
    this.phase = 'focus';
    this.updateDisplay();
  },
  toggle() {
    if (this.isRunning && !this.isPaused) this.pause();
    else this.start();
  },
  start() {
    if (this.isPaused) {
      this.isPaused = false;
      this.tick();
      document.getElementById('timerStart').innerHTML = '<i class="fas fa-pause"></i> Pause';
      return;
    }
    if (!this.selectedSubject) {
      UI.toast('Add a subject first', 'error');
      return;
    }
    if (this.mode === 'custom') {
      const mins = parseInt(document.getElementById('customMinutes').value) || 30;
      this.duration = mins * 60;
      this.remaining = this.duration;
    }
    this.isRunning = true;
    this.phase = 'focus';
    this.updateDisplay();
    document.getElementById('timerStart').innerHTML = '<i class="fas fa-pause"></i> Pause';
    UI.toast('Timer started — focus!', 'info');
    this.tick();
  },
  pause() {
    this.isPaused = true;
    clearInterval(this.interval);
    document.getElementById('timerStart').innerHTML = '<i class="fas fa-play"></i> Resume';
    UI.toast('Timer paused', 'info');
  },
  stop() {
    if (this.isRunning) {
      const elapsed = this.duration - this.remaining;
      if (elapsed >= 60) {
        this.logSession(elapsed);
      }
    }
    clearInterval(this.interval);
    this.isRunning = false;
    this.isPaused = false;
    this.remaining = this.duration;
    this.phase = 'focus';
    this.updateDisplay();
    document.getElementById('timerStart').innerHTML = '<i class="fas fa-play"></i> Start';
  },
  reset() {
    clearInterval(this.interval);
    this.isRunning = false;
    this.isPaused = false;
    this.remaining = this.duration;
    this.phase = 'focus';
    this.updateDisplay();
    document.getElementById('timerStart').innerHTML = '<i class="fas fa-play"></i> Start';
  },
  tick() {
    clearInterval(this.interval);
    this.interval = setInterval(() => {
      this.remaining--;
      this.updateDisplay();
      if (this.remaining <= 0) {
        clearInterval(this.interval);
        this.complete();
      }
    }, 1000);
  },
  complete() {
    // FIX 4: Only log a study session when a focus phase ends.
    // Previously, logSession() was called unconditionally, meaning break time
    // was also counted as study time. Now session logging and toasts are
    // handled separately per phase.
    AudioMgr.beep();
    const elapsed = this.duration;
    if (this.phase === 'focus') {
      this.logSession(elapsed);
      UI.toast('Focus session complete! 🎉', 'success');
      const breakMins = this.mode === 'custom' ? (parseInt(document.getElementById('customBreak').value) || 5) : (this.mode === 'pomodoro' ? 5 : this.mode === 'short' ? 3 : 10);
      this.phase = 'break';
      this.duration = breakMins * 60;
      this.remaining = breakMins * 60;
      this.updateDisplay();
      UI.toast('Break time! Take a rest.', 'info');
      this.tick();
    } else {
      UI.toast('Break complete! Time to focus again. 🎉', 'success');
      this.phase = 'focus';
      this.reset();
    }
  },
  logSession(seconds) {
    if (!this.selectedSubject) return;
    const session = {
      id: uid('sess'),
      subjectId: this.selectedSubject,
      duration: Math.round(seconds / 60),
      date: new Date().toISOString(),
      startTime: new Date(Date.now() - seconds * 1000).toISOString()
    };
    State.data.sessions.push(session);
    const subj = State.data.subjects.find(s => s.id === this.selectedSubject);
    if (subj) subj.totalHours += session.duration / 60;
    Streaks.recompute();
    State.save();
    this.renderHistory();
    App.refreshAll();
    Achievements.check();
  },
  updateDisplay() {
    const mins = Math.floor(this.remaining / 60);
    const secs = this.remaining % 60;
    document.getElementById('timerMinutes').textContent = String(mins).padStart(2, '0');
    document.getElementById('timerSeconds').textContent = String(secs).padStart(2, '0');
    document.getElementById('timerPhase').textContent = this.phase === 'focus' ? 'Focus' : 'Break';
    const circumference = 2 * Math.PI * 90;
    const progress = (this.duration - this.remaining) / this.duration;
    document.getElementById('timerRing').style.strokeDashoffset = circumference * progress;
  },
  renderDisplay() { this.updateDisplay(); },
  renderHistory() {
    const list = document.getElementById('sessionList');
    const sessions = [...State.data.sessions].reverse().slice(0, 30);
    document.getElementById('sessionCount').textContent = State.data.sessions.length;
    if (sessions.length === 0) {
      list.innerHTML = UI.emptyState('fa-history', 'No sessions yet. Start studying!');
      return;
    }
    list.innerHTML = sessions.map(s => {
      const subj = State.data.subjects.find(x => x.id === s.subjectId);
      const color = subj ? subj.color : '#888';
      const name = subj ? subj.name : 'Unknown';
      return `
        <div class="session-item">
          <div class="session-dot" style="background:${color}"></div>
          <div class="session-info">
            <div class="session-subject">${escapeHtml(name)}</div>
            <div class="session-time">${fmtDate(s.date, { month: 'short', day: 'numeric' })} · ${fmtTime(s.date)}</div>
          </div>
          <div class="session-duration">${fmtDuration(s.duration)}</div>
        </div>
      `;
    }).join('');
  }
};
